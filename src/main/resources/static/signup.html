<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .signup-form {
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .signup-form h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .signup-form label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .signup-form input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .signup-form button {
            width: 100%;
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .signup-form button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            font-size: 0.9em;
            margin-top: -10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<form class="signup-form" action="/signup" method="POST">
    <h1>회원가입</h1>

    <label for="username">아이디</label>
    <input type="text" id="username" name="username" placeholder="아이디를 입력해주세요" required>
    <small class="error">* 아이디를 입력해주세요.</small>

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요" required>
    <small class="error">* 비밀번호는 최소 8자리, 1개 이상의 알파벳, 숫자, 특수문자를 포함해야 합니다.</small>

    <label for="name">사용자 이름</label>
    <input type="text" id="name" name="name" placeholder="사용자 이름을 입력해주세요" required>
    <small class="error">* 사용자 이름은 최소 2자 이상이어야 합니다.</small>

    <label for="nickname">닉네임</label>
    <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력해주세요" required>
    <small class="error">* 닉네임은 최소 2자 이상이어야 합니다.</small>

    <button type="submit">회원가입</button>
</form>
</body>
</html>
